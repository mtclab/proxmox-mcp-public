name: Leak canary

# Defense-in-depth scan for operator secrets/identifiers that the private-side
# scrub should have removed. Structural patterns only — this file must never
# contain a real secret or identifier itself. Known-bad secrets are matched by
# sha256 so the canary can detect them without embedding them.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Scan for leaked secrets and operator identifiers
        run: |
          set -uo pipefail
          FAIL=0

          scan() { # scan <label> <grep -E pattern> [allow-pattern]
            local label="$1" pat="$2" allow="${3:-__none__}"
            local hits
            hits=$(grep -rIE "$pat" . \
              --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.venv \
              --exclude=leak-canary.yml 2>/dev/null | grep -vE "$allow" || true)
            if [ -n "$hits" ]; then
              echo "::error::Leak canary tripped: $label"
              echo "$hits" | head -20
              FAIL=1
            else
              echo "PASS: $label"
            fi
          }

          # 1. Known-bad strings (secrets + real PVE token IDs), matched by
          #    sha256 so this file never embeds them. Candidates = every
          #    UUID-shaped string and every PVE token-id-shaped string.
          BAD_HASHES="76c66c2e8dc283f0c75987e837fb53c86dc1c1f190a007a499ffd9d1e5094d27
eacf284b9edc9fae79aea7cda26c2f81a0767d7aab9971efce802631848ebd1e
ac8208f66e47e80a23ecf36e5282fa59544a88376e8a5d2bc8f8d5ed6bd8a2eb"
          while read -r cand; do
            h=$(printf '%s' "$cand" | sha256sum | cut -d' ' -f1)
            if printf '%s\n' "$BAD_HASHES" | grep -qx "$h"; then
              echo "::error::Leak canary tripped: known leaked string present (sha256 $h)"
              grep -rIlF "$cand" . --exclude-dir=.git | head -5
              FAIL=1
            fi
          done < <(grep -rIhoE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|[A-Za-z0-9_-]+@pve![A-Za-z0-9_-]+' . \
                     --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.venv \
                     --exclude=leak-canary.yml 2>/dev/null | sort -u)
          [ "$FAIL" = 0 ] && echo "PASS: no known leaked string"

          # 3. Operator subnet — any 10.96.x.x address.
          scan "operator subnet 10.96.x.x" '\b10\.96\.[0-9]{1,3}\.[0-9]{1,3}\b'

          # 4. Real timezone (location leak) — placeholders use Etc/UTC.
          scan "non-UTC IANA timezone" 'Europe/[A-Za-z_]+|Asia/[A-Za-z_]+'

          # 5. Local dev paths with usernames.
          scan "local dev home path" '/home/[a-z]+-user/'

          # 6. Internal ops tooling must not ship.
          for f in scripts/scrub-for-public.sh scripts/validate-scrub.sh AGENTS.md; do
            if [ -e "$f" ]; then
              echo "::error::Leak canary tripped: internal ops file present: $f"
              FAIL=1
            else
              echo "PASS: $f absent"
            fi
          done

          exit "$FAIL"
